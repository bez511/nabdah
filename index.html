<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

        /* Optimized CSS */
        body { margin: 0; font-family: Arial, sans-serif; }

        <p>Footer Content © 2026</p>
