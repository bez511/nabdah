        /* Optimized CSS */
        body { margin: 0; font-family: Arial, sans-serif; }
        header, footer { padding: 20px; background-color: #f0f0f0; text-align: center; }
        main { padding: 20px; }
        h1, p { color: #333; }
    </style>
</head>
<body>
    <header>

    <main>
        <p>This is an example of how to structure a simple HTML document.</p>
        <p>Make sure to check out the optimized CSS linked above!</p>
    </main>
    <footer>
        <p>Footer Content © 2026</p>
    </footer>
</body>
</html>
