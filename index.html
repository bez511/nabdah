<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b1220" />
  <title>نبضه — أخبار واضحة بدون تضخيم</title>
  <meta name="description" content="نبضه — منصة إخبارية تعرض مقالات مختارة بوضوح، مع بحث وفلترة وتجربة قراءة سريعة." />
  <link rel="icon" href="assets/favicon.ico" />
  <link rel="stylesheet" href="assets/style.css" />
  <meta name="author" content="bez511" />
  <meta name="robots" content="index, follow" />
  <!-- Open Graph -->
  <meta property="og:site_name" content="نبضه" />
  <meta property="og:title" content="نبضه — أخبار واضحة بدون تضخيم" />
  <meta property="og:description" content="أحدث المقالات والتغطيات المختارة بعناية." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/hero.jpg" />
  <meta property="og:locale" content="ar_SA" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="نبضه — أخبار واضحة بدون تضخيم" />
  <meta name="twitter:description" content="أحدث المقالات والتغطيات المختارة بعناية." />
  <meta name="twitter:image" content="assets/hero.jpg" />

  <!-- Structured data (JSON-LD) for basic site info and list of articles (will be enhanced by script if needed) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NewsMediaOrganization",
    "name": "نبضه",
    "url": ".",
    "logo": {
      "@type": "ImageObject",
      "url": "assets/logo.png"
    },
    "sameAs": []
  }
  </script>

  <style>
    /* Minimal inline CSS to ensure layout doesn't break before external CSS loads.
       The main styling should be in assets/style.css. */
    :root{--bg:#0b1220;--card:#0f1724;--muted:#9aa4b2;--accent:#ff6b6b;--glass:rgba(255,255,255,0.03)}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans","Helvetica Neue",Arial,"Noto Naskh Arabic",sans-serif;background:var(--bg);color:#e6eef6}
    a{color:inherit;text-decoration:none}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    .container{max-width:1100px;margin:0 auto;padding:20px}
    header.site-header{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 0}
    .brand{display:flex;align-items:center;gap:12px}
    .brand img{width:44px;height:44px;border-radius:8px;object-fit:cover}
    .brand h1{font-size:18px;margin:0}
    .search-wrap{flex:1;display:flex;justify-content:center}
    .search-box{width:100%;max-width:640px;display:flex;gap:8px;align-items:center}
    .search-box input{flex:1;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit}
    .search-box button{padding:10px 12px;border-radius:8px;border:0;background:var(--accent);color:#fff;cursor:pointer}
    nav.main-nav{display:flex;gap:12px;align-items:center}
    .hero{display:grid;grid-template-columns:1fr;gap:18px;margin:18px 0;padding:18px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));overflow:hidden}
    .hero-media{height:220px;background:#0b1220;border-radius:10px;overflow:hidden}
    .hero-media img{width:100%;height:100%;object-fit:cover;display:block}
    .hero-body{padding:6px 2px}
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:18px}
    .card{background:var(--card);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;min-height:220px;box-shadow:0 6px 18px rgba(2,6,23,0.6)}
    .card-media{height:140px;background:linear-gradient(90deg,#0b1220,#0f1724);overflow:hidden}
    .card-media img{width:100%;height:100%;object-fit:cover;display:block}
    .card-body{padding:12px;display:flex;flex-direction:column;gap:8px;flex:1}
    .card-title{font-size:16px;margin:0}
    .card-excerpt{font-size:13px;color:var(--muted);margin:0;flex:1}
    .card-meta{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--muted)}
    .tag{display:inline-block;background:var(--glass);padding:4px 8px;border-radius:999px;font-size:12px;color:var(--muted)}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:12px}
    .tag-filter{background:transparent;border:1px solid rgba(255,255,255,0.04);padding:8px 10px;border-radius:8px;color:var(--muted);cursor:pointer}
    .tag-filter.active{background:var(--accent);color:#fff;border-color:transparent}
    #pagination{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:18px}
    .page-btn{padding:8px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--muted);cursor:pointer}
    .page-btn.active{background:var(--accent);color:#fff;border-color:transparent}
    footer.site-footer{padding:18px 0;color:var(--muted);font-size:13px;text-align:center;margin-top:36px}
    .loading,.empty,.error{padding:24px;border-radius:8px;background:rgba(255,255,255,0.02);text-align:center;color:var(--muted)}
    @media (max-width:720px){.hero-media{height:160px}.card-media{height:120px}}
  </style>
</head>
<body>
  <a class="sr-only" href="#main">تخطي إلى المحتوى</a>

  <header class="site-header container" role="banner" aria-label="رأس الموقع">
    <div class="brand" role="img" aria-label="شعار نبضه">
      <img src="assets/logo.png" alt="شعار نبضه" />
      <div>
        <h1>نبضه</h1>
        <div style="font-size:12px;color:var(--muted)">أخبار واضحة بدون تضخيم</div>
      </div>
    </div>

    <div class="search-wrap" role="search" aria-label="بحث في المقالات">
      <form class="search-box" onsubmit="event.preventDefault(); document.getElementById('searchInput').dispatchEvent(new Event('input'));">
        <label for="searchInput" class="sr-only">بحث</label>
        <input id="searchInput" name="q" type="search" placeholder="ابحث عن موضوع أو وسم..." aria-label="بحث عن مقالات" />
        <button type="submit" aria-label="بحث">بحث</button>
      </form>
    </div>

    <nav class="main-nav" role="navigation" aria-label="القائمة الرئيسية">
      <a href="index.html" aria-current="page">الرئيسية</a>
      <a href="search.html">بحث متقدم</a>
      <a href="article.html">مقالات</a>
    </nav>
  </header>

  <main id="main" class="container" role="main" aria-labelledby="main-title">
    <section class="hero" aria-labelledby="main-title">
      <div class="hero-media" aria-hidden="true">
        <img src="assets/hero.jpg" alt="صورة رئيسية" />
      </div>
      <div class="hero-body">
        <h2 id="main-title" style="margin:0 0 8px 0">أحدث المقالات</h2>
        <p style="margin:0;color:var(--muted)">تحديثات فورية ومقالات مختارة بعناية. استخدم البحث والوسوم لتصفية المحتوى.</p>

        <div class="controls" style="margin-top:12px">
          <div id="tagFilters" aria-label="فلتر الوسوم" role="toolbar" aria-live="polite">
            <!-- وسوم ستُملأ ديناميكيًا -->
          </div>

          <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
            <button id="refreshBtn" class="tag-filter" aria-label="تحديث المقالات">تحديث</button>
            <div style="font-size:12px;color:var(--muted)">عرض سريع</div>
          </div>
        </div>
      </div>
    </section>

    <!-- منطقة عرض المقالات -->
    <section aria-label="قائمة المقالات" style="margin-top:18px">
      <div id="articlesGrid" class="cards-grid" role="list" aria-live="polite" aria-busy="false">
        <!-- سيتم ملء البطاقات ديناميكيًا بواسطة script.js -->
        <!-- نضع هنا بعض الـ skeletons لعرض تحميل جميل قبل وصول البيانات -->
        <article class="card" role="article" aria-hidden="true">
          <div class="card-media" style="background:linear-gradient(90deg,#0b1220,#0f1724)"></div>
          <div class="card-body">
            <h3 class="card-title" style="background:rgba(255,255,255,0.03);height:18px;width:70%;border-radius:6px"></h3>
            <p class="card-excerpt" style="background:rgba(255,255,255,0.02);height:12px;width:90%;border-radius:6px;margin-top:8px"></p>
            <div class="card-meta" style="margin-top:auto">
              <span style="background:rgba(255,255,255,0.02);height:12px;width:40px;border-radius:6px;display:inline-block"></span>
            </div>
          </div>
        </article>
        <article class="card" role="article" aria-hidden="true">
          <div class="card-media" style="background:linear-gradient(90deg,#0b1220,#0f1724)"></div>
          <div class="card-body">
            <h3 class="card-title" style="background:rgba(255,255,255,0.03);height:18px;width:60%;border-radius:6px"></h3>
            <p class="card-excerpt" style="background:rgba(255,255,255,0.02);height:12px;width:80%;border-radius:6px;margin-top:8px"></p>
            <div class="card-meta" style="margin-top:auto">
              <span style="background:rgba(255,255,255,0.02);height:12px;width:40px;border-radius:6px;display:inline-block"></span>
            </div>
          </div>
        </article>
        <!-- المزيد من skeletons لتغطية الشبكة -->
        <article class="card" role="article" aria-hidden="true"><div class="card-media"></div><div class="card-body"><h3 class="card-title" style="background:rgba(255,255,255,0.03);height:18px;width:50%"></h3><p class="card-excerpt" style="background:rgba(255,255,255,0.02);height:12px;width:70%"></p></div></article>
        <article class="card" role="article" aria-hidden="true"><div class="card-media"></div><div class="card-body"><h3 class="card-title" style="background:rgba(255,255,255,0.03);height:18px;width:80%"></h3><p class="card-excerpt" style="background:rgba(255,255,255,0.02);height:12px;width:60%"></p></div></article>
      </div>

      <nav id="pagination" aria-label="تنقل الصفحات" style="margin-top:18px">
        <!-- أزرار الصفحات ستُملأ ديناميكيًا -->
      </nav>
    </section>

    <!-- روابط مفيدة / شريط جانبي بسيط -->
    <aside aria-label="روابط سريعة" style="margin-top:28px">
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <a class="tag-filter" href="#" role="button">الأكثر قراءة</a>
        <a class="tag-filter" href="#" role="button">الأحدث</a>
        <a class="tag-filter" href="#" role="button">مقالات مختارة</a>
      </div>
    </aside>

    <!-- قالب بطاقة المقال (يستخدمه السكربت) -->
    <template id="article-card-template">
      <article class="card" role="article" aria-labelledby="title-{{id}}">
        <a class="card-link" href="{{url}}" aria-label="{{title}}">
          <div class="card-media">
            <img data-src="{{image}}" alt="{{title}}" class="lazy-img" loading="lazy" />
          </div>
          <div class="card-body">
            <h3 id="title-{{id}}" class="card-title">{{title}}</h3>
            <p class="card-excerpt">{{excerpt}}</p>
            <div class="card-meta">
              <time datetime="{{isoDate}}">{{date}}</time>
              <span class="read-time">{{readTime}}</span>
            </div>
            <div class="card-tags">{{tags}}</div>
          </div>
        </a>
      </article>
    </template>

    <!-- نص بديل للمستخدمين الذين لا يدعمون الجافاسكربت -->
    <noscript>
      <div class="container" style="margin-top:18px">
        <div class="error">يجب تفعيل JavaScript لعرض المقالات بشكل صحيح. يمكنك تحميل الصفحة مرة أخرى بعد تفعيل JavaScript.</div>
      </div>
    </noscript>
  </main>

  <footer class="site-footer container" role="contentinfo">
    <div>© <strong>نبضه</strong> — عرض تجريبي. جميع الحقوق محفوظة.</div>
    <div style="margin-top:8px;color:var(--muted)">مستودع المشروع: bez511 / nabdah</div>
  </footer>

  <!-- سكربتات مساعدة صغيرة قبل تحميل السكربت الرئيسي -->
  <script>
    // تحسين تجربة: إذا كان المستخدم يضغط زر التحديث، نمرر طلب إعادة تحميل للسكربت
    document.addEventListener('click', function (e) {
      const btn = e.target.closest && e.target.closest('#refreshBtn');
      if (!btn) return;
      // استدعاء الدالة العامة إن كانت متاحة
      if (window.Nabdah && typeof window.Nabdah.refresh === 'function') {
        btn.setAttribute('disabled', 'disabled');
        btn.textContent = 'جارٍ التحديث…';
        window.Nabdah.refresh(true).then(() => {
          // إعادة تحميل الصفحة لعرض التحديثات
          location.reload();
        }).catch(() => {
          btn.removeAttribute('disabled');
          btn.textContent = 'تحديث';
          alert('تعذر التحديث الآن. حاول لاحقًا.');
        });
      } else {
        // إذا السكربت لم يُحمّل بعد، فقط أعد تحميل الصفحة
        location.reload();
      }
    });
  </script>

  <!-- ربط السكربت الرئيسي -->
  <script src="assets/script.js" defer></script>

  <!-- تعليمات للمطور: عناصر يجب أن تتواجد في index.html لتعمل الوظائف -->
  <!--
    مطلوب:
    - عنصر البحث: <input id="searchInput" />
    - عنصر عرض المقالات: <div id="articlesGrid"></div>
    - عنصر الفلاتر: <div id="tagFilters"></div>
    - عنصر التصفح: <nav id="pagination"></nav>
    - قالب البطاقة: <template id="article-card-template">...</template>
    - زر تحديث اختياري: #refreshBtn
    السكربت يتوقع أن ملف البيانات موجود في: assets/data/articles.json
  -->

</body>
</html>
